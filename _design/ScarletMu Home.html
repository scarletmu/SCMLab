<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>ScarletMu · 8-bit Home — Design Explorations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- pixel + mono fonts: DotGothic16 covers CJK pixel-style; Press Start 2P for EN labels; VT323 for terminal body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    html, body { margin: 0; padding: 0; background: #d7cdae; overflow: hidden; }
    body { font-family: "DotGothic16", "VT323", monospace; }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- design canvas -->
  <script type="text/babel" src="design-canvas.jsx"></script>

  <!-- shared data + primitives -->
  <script type="text/babel" src="data.jsx"></script>

  <!-- variants -->
  <script type="text/babel" src="variant-a.jsx"></script>
  <script type="text/babel" src="variant-b.jsx"></script>
  <script type="text/babel" src="variant-c.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      return (
        <DesignCanvas backgroundColor="#d7cdae">
          <DCSection
            id="home"
            title="ScarletMu · 主推 A (打磨中)"
            subtitle="A 为底，融入 B 的训练家手册 + 存档时间"
          >
            <DCArtboard id="a" label="A · 主推版 · 角色卡 + 训练家手册" width={1440} height={1024}>
              <VariantA />
            </DCArtboard>
          </DCSection>
          <DCSection
            id="refs"
            title="参考方向（保留对比）"
            subtitle="B 形象先行 / C 终端 + 地下城"
          >
            <DCArtboard id="b" label="B · 训练家手册 · 形象先行" width={1440} height={1024}>
              <VariantB />
            </DCArtboard>
            <DCArtboard id="c" label="C · 终端 + 地下城地图" width={1440} height={1024}>
              <VariantC />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
