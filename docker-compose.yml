services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        GITHUB_LOGIN: ${GITHUB_LOGIN}
    image: scarletmu-home:latest
    container_name: scarletmu-home
    restart: unless-stopped
    ports:
      # Bind to localhost only — Nginx reverse-proxies
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_LOGIN=${GITHUB_LOGIN}
    volumes:
      # Media originals live outside the container. The same host path is also
      # served by Nginx (alias) for direct hits; Next.js reads it for image
      # optimization via /_next/image. Set MEDIA_DIR in .env.
      - ${MEDIA_DIR:-./public/media}:/app/public/media:ro
      # Real content YAMLs (personal data) — not baked into the image, only
      # *.example.yml templates ship in the repo. Overlay real content here.
      - ${CONTENT_DIR:-./content}:/app/content:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
